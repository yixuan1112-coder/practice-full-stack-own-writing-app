<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All world's comment board</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        input { width: 70%; padding: 8px; }
        button { padding: 8px 15px; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; margin-top: 5px; background: #f9f9f9; }
    </style>
</head>
<body>

    <h2>The result of everyone input：</h2>
    
    <div>
        <input type="text" id="userInput" placeholder="input what you want to comment or what you're thinking...">
        <button onclick="sendData()">提交共享</button>
    </div>

    <ul id="resultList"></ul>

    <script>
        const API_URL = 'https://practice-full-stack-own-writing-app.onrender.com/';
        async function sendData() {
            const input = document.getElementById('userInput');
            if (!input.value.trim()) return alert('content can not be empty');

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: input.value })
            });

            const result = await response.json();
            if (result.success) {
                input.value = ''; 
                loadAllData();   
            }
        }

        async function loadAllData() {
            const response = await fetch(API_URL);
            const data = await response.json(); 

            const list = document.getElementById('resultList');
            list.innerHTML = ''; 

            data.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item.content;
                list.appendChild(li);
            });
        }

        window.onload = loadAllData;
    </script>
</body>
</html>
